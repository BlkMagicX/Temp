exp_name: exp_mpcattack-eps-16_awq_qwen25-vl-3b

output:
  root_dir: outputs

runtime:
  resume: false
  direct_image_test:
    enabled: true
    pairs_file: examples/mpcattack-eps-16_pairs.jsonl

data:
  annotation_path: examples/mpcattack-eps-16_samples.json
  check_image_exists: false

models:
  eval_precisions:
    - bf16
    - w4a16

  eval_model_template:
    name: qwen25vl
    model_path: Qwen/Qwen2.5-VL-3B-Instruct
    quant_model_path: null
    device: cuda
    device_map: auto
    require_differentiable: false
    force_model_dtype: true
    trust_remote_code: true
    quant_backend_config:
      enable_placeholder_load: false

  precision_overrides:
    bf16:
      backend_type: bf16
      quant_model_path: null
      torch_dtype: bfloat16
    w4a16:
      backend_type: awq
      quant_model_path: Qwen/Qwen2.5-VL-3B-Instruct-AWQ
      torch_dtype: bfloat16
      device_map: auto

generation:
  max_new_tokens: 32
  do_sample: false

judge:
  type: qwen_api_caption
  model_name: qwen-plus
  torch_dtype: bfloat16
  caption_success_threshold: 0.5
  refusal_keywords:
    - 抱歉
    - 不能帮助
    - 无法协助
    - i can't
    - sorry
  lazy_load: true
  max_new_tokens: 32
  do_sample: false
  trust_remote_code: true