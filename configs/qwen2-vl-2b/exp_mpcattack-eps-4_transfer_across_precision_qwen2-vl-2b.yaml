exp_name: exp_mpcattack-eps-4_transfer_across_precision_qwen2-vl-2b

output:
  root_dir: outputs

runtime:
  resume: false
  direct_image_test:
    enabled: true
    pairs_file: examples/mpcattack/eps-4/pairs.jsonl

data:
  annotation_path: examples/mpcattack/eps-4/samples.json
  check_image_exists: false

models:
  eval_precisions:
    - bf16
    - w8a16
    - w4a16

  eval_model_template:
    name: qwen2vl
    model_path: Qwen/Qwen2-VL-2b-Instruct
    quant_model_path: null
    torch_dtype: auto

  precision_overrides:
    bf16:
      backend_type: bf16
      quant_model_path: null

    w8a16:
      backend_type: gptq
      quant_model_path: Qwen/Qwen2-VL-2b-Instruct-GPTQ-INT8
      torch_dtype: bfloat16
      device_map: auto

    w4a16:
      backend_type: gptq
      quant_model_path: Qwen/Qwen2-VL-2b-Instruct-GPTQ-Int4
      torch_dtype: bfloat16
      device_map: auto

generation:
  max_new_tokens: 32
  do_sample: false

judge:
  type: qwen_api_caption
  model_name: qwen-plus
  torch_dtype: bfloat16
  caption_success_threshold: 0.6
  refusal_keywords:
    - 抱歉
    - 不能帮助
    - 无法协助
    - i can't
    - sorry
  lazy_load: true
  max_new_tokens: 32
  do_sample: false
  trust_remote_code: true